<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="128,14 225,70 225,186 128,242 31,186 31,70"
           fill="none" stroke="url(#g)" stroke-width="16" stroke-linejoin="round" filter="url(#s)"/>

  <!-- Inner hexagon guide -->
  <polygon points="128,50 191,86 191,170 128,206 65,170 65,86"
           fill="none" stroke="url(#g)" stroke-width="3" stroke-linejoin="round" opacity="0.35"/>

  <!-- Central node -->
  <circle cx="128" cy="128" r="26" fill="url(#g)"/>

  <!-- Connection lines to vertices -->
  <line x1="128" y1="102" x2="128" y2="38" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
  <line x1="150" y1="141" x2="205" y2="173" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>
  <line x1="106" y1="141" x2="51" y2="173" stroke="url(#g)" stroke-width="7" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="128" cy="38" r="9" fill="url(#g)"/>
  <circle cx="205" cy="173" r="9" fill="url(#g)"/>
  <circle cx="51" cy="173" r="9" fill="url(#g)"/>
</svg>
